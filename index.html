<!doctype html>
<html>
<head>
  <title>Clockwall</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="dist/style.css" rel="stylesheet">
</head>
<body class="bg-slate-100 dark:bg-gray-800">
  <div class="flex justify-center items-center">
    <div class="mt-1 p-10 flex flex-row flex-wrap gap-6 justify-center" id="contacts-list"></div>
  </div>
  <button class="absolute bottom-10 right-10 rounded-2xl shadow-lg w-20 h-20 flex bg-white dark:bg-gray-600 justify-center items-center cursor-pointer" id="add-new-person">
    <div>
      <img title="Add a person" class="w-6 h-6 opacity-80" src="img/plus.png" alt="">
    </div>
  </button>
  <div id="add-new-person-overlay" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center" style="display: none;">
    <div id="add-new-person-window" class="w-auto p-6 bg-white dark:bg-gray-700 shadow-lg rounded-2xl">
      <form id="add-new-person-form" class="flex flex-col gap-4">
        <h2 class="text-lg font-bold dark:text-white">Add new person</h2>
        <input type="text" name="name" id="new-person-name" placeholder="Name" class="p-2 border border-slate-200 rounded-lg dark:bg-gray-600 dark:text-white dark:border-gray-500">
        <select name="timezone" id="new-person-timezone" class="p-2 border border-slate-200 rounded-lg dark:bg-gray-600 dark:text-white dark:border-gray-500"></select>
        <div class="flex flex-col gap-2">
            <button type="button" id="cancel-modal-button" class="p-2 bg-gray-300 dark:bg-gray-500 text-black dark:text-white rounded-lg">Cancel</button>
            <button type="submit" class="p-2 bg-blue-500 text-white rounded-lg">Add</button>
        </div>
      </form>
    </div>
  </div>

  <div id="edit-time-overlay" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center" style="display: none;">
    <div id="edit-time-window" class="w-auto p-6 bg-white dark:bg-gray-700 shadow-lg rounded-2xl">
      <form id="edit-time-form" class="flex flex-col gap-4">
        <h2 class="text-lg font-bold dark:text-white">Edit Time</h2>
        <input type="time" name="time" id="edit-time-input" class="p-2 border border-slate-200 rounded-lg dark:bg-gray-600 dark:text-white dark:border-gray-500">
        <div class="flex gap-2 justify-end">
          <button type="button" id="cancel-edit-time-button" class="p-2 bg-gray-300 dark:bg-gray-500 text-black dark:text-white rounded-lg">Cancel</button>
          <button type="submit" class="p-2 bg-blue-500 text-white rounded-lg">Save</button>
        </div>
      </form>
    </div>
  </div>
  
  
</div>
<script src="script.js"></script>
</body>
</html>
